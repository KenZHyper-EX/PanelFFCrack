<!DOCTYPE html>
<html lang="vi">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HEADLOCK Premium - BYPASS FIX</title>
    <link rel="stylesheet" href="./HEADLOCK Premium_files/all.min.css">
    <link rel="stylesheet" href="./HEADLOCK Premium_files/style.css">
</head>
<body>
    <div class="page splash-screen" id="splashScreen">
        <div class="logo-container">
            <div class="logo-placeholder"><img id="splashLogo" src="./HEADLOCK Premium_files/logo.png"></div>
            <div class="premium-text">PREMIUM</div>
        </div>
        <div class="tap-text">Tap anywhere to continue</div>
    </div>

    <div class="page login-screen" id="loginScreen">
        <div class="login-header">
            <button class="back-btn">← Back</button>
            <h1>HEADLOCK</h1>
            <div class="login-logo"><div class="login-logo-placeholder"><img id="loginLogo" src="./HEADLOCK Premium_files/logo.png"></div></div>
            <p class="key-login-text">BYPASS VERSION</p>
        </div>
        <div class="login-form">
            <input type="text" class="key-input" placeholder="Key Auto..." id="keyInput" value="ADMIN-BYPASS">
            <button class="login-btn" id="loginBtn">LOGIN</button>
        </div>
    </div>

    <div class="page main-screen active" id="mainScreen">
        <div class="header">
            <button class="back-btn" id="mainBackBtn">← Back</button>
            <div class="header-title"><h1>HEADLOCK</h1><p class="header-subtitle">BY Khoi x Nhism</p></div>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
        <div class="main-content">
            <div class="main-logo"><img id="mainLogo" src="./HEADLOCK Premium_files/logo.png"></div>
            <div class="toggle-section">
                <div class="toggle-item">
                    <div class="toggle-label"><span>🎯 REG FILES</span></div>
                    <div class="toggle-switch" data-toggle="reg"><div class="toggle-slider"></div></div>
                </div>
                <div class="toggle-item">
                    <div class="toggle-label"><span>🚀 BOOST RAM</span></div>
                    <div class="toggle-switch" data-toggle="boot"><div class="toggle-slider"></div></div>
                </div>
                <div class="toggle-item">
                    <div class="toggle-label"><span>💀 HEADLOCK</span></div>
                    <div class="toggle-switch" data-toggle="headlock"><div class="toggle-slider"></div></div>
                </div>
                <div class="toggle-item">
                    <div class="toggle-label"><span>⚙️ FIX RUNG</span></div>
                    <div class="toggle-switch" data-toggle="fix"><div class="toggle-slider"></div></div>
                </div>
            </div>
            <div class="start-buttons">
                <h3>STARTING FILES</h3>
                <div class="button-group">
                    <button class="start-btn on" id="onBtn">ON</button>
                    <button class="start-btn off active" id="offBtn">OFF</button>
                </div>
            </div>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="freefire-selector">
            <h3>Chọn phiên bản Free Fire:</h3>
            <div class="freefire-options">
                <button class="freefire-option active" data-version="freefire">Free Fire</button>
                <button class="freefire-option" data-version="freefiremax">Free Fire Max</button>
            </div>
        </div>
        <button class="modal-btn success" id="openFreeFireBtn">✓ HeadLock Was Successful!</button>
        <button class="modal-btn danger" id="turnOffBtn">✕ Turn off</button>
    </div>

    <div class="bostram-modal" id="bostramModal">
        <div class="bostram-header"><h2>🚀 Tối ưu máy</h2></div>
        <div class="bostram-content">
            <div class="code-terminal" id="codeTerminal">
                <div class="code-line">$ Initializing...</div>
                <div class="code-line">$ Scanning RAM...</div>
                <div class="code-line">$ Clearing Cache...</div>
                <div class="code-line">$ Done!</div>
            </div>
            <div class="bostram-success" id="bostramSuccess" style="display: none;">
                <div class="success-icon">✓</div>
                <div class="success-text">BOST RAM thành công!</div>
                <button class="modal-btn success" id="closeBostramBtn">Đóng</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="toggle-toast" id="toggleToast"></div>

<script>
// ==================== 1. HỆ THỐNG BYPASS & GIẢ LẬP SERVER ====================
let isLoggedIn = true;
let currentKey = "VIP-BYPASS-ADMIN";

async function activateKey() {
    return { success: true, data: { valid: true, expiresAt: "31/12/2099" } };
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function showToggleToast(msg) {
    const toast = document.getElementById("toggleToast");
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add("active");
    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(() => toast.classList.remove("active"), 2000);
}

// ==================== 2. HÀM MỞ GAME THẬT (DEEP LINK) ====================
function openGame(version) {
    const scheme = (version === 'freefiremax') ? 'freefiremax://' : 'freefireth://';
    
    // Tạo iframe ẩn để kích hoạt scheme (giúp chạy mượt hơn trên một số trình duyệt)
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = scheme;
    document.body.appendChild(iframe);
    
    // Chuyển hướng trực tiếp
    window.location.href = scheme;
    
    setTimeout(() => { document.body.removeChild(iframe); }, 3000);
}

// ==================== 3. KHỞI CHẠY VÀ XỬ LÝ SỰ KIỆN ====================
document.addEventListener("DOMContentLoaded", () => {
    // Vào thẳng màn hình chính
    showPage("mainScreen");

    // Xử lý BOST RAM (Chạy Terminal y bản gốc)
    const bootToggle = document.querySelector('.toggle-switch[data-toggle="boot"]');
    bootToggle.onclick = function() {
        if (!this.classList.contains("active")) {
            document.getElementById("bostramModal").classList.add("active");
            document.getElementById("overlay").classList.add("active");
            
            // Hiệu ứng chạy code từng dòng
            const lines = document.querySelectorAll("#codeTerminal .code-line");
            document.getElementById("codeTerminal").style.display = "block";
            document.getElementById("bostramSuccess").style.display = "none";
            
            lines.forEach((l, i) => {
                l.style.opacity = "0";
                l.style.display = "block";
                setTimeout(() => { l.style.opacity = "1"; }, i * 400);
            });

            setTimeout(() => {
                document.getElementById("codeTerminal").style.display = "none";
                document.getElementById("bostramSuccess").style.display = "flex";
                this.classList.add("active");
            }, 3000);
        } else {
            this.classList.remove("active");
            showToggleToast("Đã tắt BOST RAM");
        }
    };

    // Xử lý chọn phiên bản Free Fire trong Modal
    let selectedVersion = 'freefire';
    document.querySelectorAll('.freefire-option').forEach(opt => {
        opt.onclick = function() {
            document.querySelectorAll('.freefire-option').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedVersion = this.dataset.version;
            localStorage.setItem('HEADLOCK_VERSION', selectedVersion);
        };
    });

    // Nút ON (Mở Modal chọn FF)
    document.getElementById("onBtn").onclick = () => {
        document.getElementById("onBtn").classList.add("active");
        document.getElementById("offBtn").classList.remove("active");
        document.getElementById("successModal").classList.add("active");
        document.getElementById("overlay").classList.add("active");
    };

    // Nút "✓ HeadLock Was Successful!" -> NHẤN VÀO ĐỂ VÀO GAME
    document.getElementById("openFreeFireBtn").onclick = () => {
        showToggleToast("Đang khởi động Game...");
        setTimeout(() => {
            openGame(selectedVersion);
        }, 800);
    };

    // Nút OFF và Đóng Modal
    const closeModals = () => {
        document.querySelectorAll('.success-modal, .bostram-modal, .overlay').forEach(m => m.classList.remove('active'));
    };

    document.getElementById("offBtn").onclick = () => {
        document.getElementById("onBtn").classList.remove("active");
        document.getElementById("offBtn").classList.add("active");
        closeModals();
        showToggleToast("Đã tắt HeadLock");
    };

    document.getElementById("turnOffBtn").onclick = () => { document.getElementById("offBtn").click(); };
    document.getElementById("overlay").onclick = closeModals;
    document.getElementById("closeBostramBtn").onclick = closeModals;

    // Các Toggle khác (REG, FIX)
    document.querySelectorAll('.toggle-switch:not([data-toggle="boot"])').forEach(ts => {
        ts.onclick = function() {
            this.classList.toggle("active");
            const label = this.closest('.toggle-item').querySelector('span:last-child').textContent;
            showToggleToast(this.classList.contains("active") ? `Đã bật ${label}` : `Đã tắt ${label}`);
        };
    });
});
</script>
</body>
</html>
